<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DotReport EdgeCore</title>

    <!-- ONNX Runtime Web — WebGPU + WASM execution (UAC 7.1) -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>

    <!-- Babylon.js — 3D Kinetic Structuralism engine (UAC 7.3, 7.4) -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

    <!-- Kinetic Structuralism theme sheets -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/theme-dark.css" id="theme-sheet" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
      <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'>
        <rect width='32' height='32' fill='%231a1a1a'/>
        <polygon points='16,4 28,10 28,22 16,28 4,22 4,10' fill='none' stroke='%23ffffff' stroke-width='1.5'/>
      </svg>" />
</head>
<body>
    <style>
        /* Boot screen — all styles inlined to avoid FOUC */
        @keyframes bs-spin  { from{transform:rotate(0deg)}    to{transform:rotate(360deg)} }
        @keyframes bs-rspin { from{transform:rotate(0deg)}    to{transform:rotate(-360deg)} }
        @keyframes bs-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
        @keyframes bs-float2{ 0%,100%{transform:translateY(0) rotate(45deg)} 50%{transform:translateY(-10px) rotate(45deg)} }
        @keyframes bs-scan  { 0%{top:-3px;opacity:0} 8%{opacity:1} 92%{opacity:1} 100%{top:100%;opacity:0} }
        @keyframes bs-glow  { 0%,100%{text-shadow:0 0 12px rgba(99,102,241,0.6)} 50%{text-shadow:0 0 28px rgba(99,102,241,0.9),0 0 50px rgba(6,182,212,0.4)} }
        @keyframes bs-grad  { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        @keyframes bs-pulse { 0%,100%{opacity:0.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }

        #ec-boot {
            position:fixed; inset:0;
            background:#060609;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            font-family:'Courier New',monospace;
            color:#ffffff; overflow:hidden;
        }

        /* ── Geometric background shapes ── */
        .bs-geo { position:absolute; pointer-events:none; }

        /* Large hexagon — top-right, indigo */
        #bs-hex-a {
            top:-150px; right:-150px;
            width:560px; height:560px;
            border:2px solid rgba(99,102,241,0.38);
            box-shadow:0 0 80px rgba(99,102,241,0.1), inset 0 0 80px rgba(99,102,241,0.05);
            clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
            animation:bs-spin 90s linear infinite;
        }
        /* Inner hexagon */
        #bs-hex-b {
            top:-70px; right:-70px;
            width:320px; height:320px;
            border:1px solid rgba(99,102,241,0.24);
            clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
            animation:bs-rspin 55s linear infinite;
        }
        /* Large triangle — bottom-left, rose */
        #bs-tri-a {
            bottom:-120px; left:-100px;
            width:480px; height:480px;
            border:2px solid rgba(244,63,94,0.30);
            box-shadow:0 0 60px rgba(244,63,94,0.07);
            clip-path:polygon(50% 0%,0% 100%,100% 100%);
            animation:bs-spin 130s linear infinite;
        }
        /* Diamond — left center, cyan */
        #bs-dia {
            top:35%; left:-80px;
            width:200px; height:200px;
            border:1px solid rgba(6,182,212,0.35);
            box-shadow:0 0 24px rgba(6,182,212,0.09);
            animation:bs-float2 9s ease-in-out infinite;
        }
        /* Large ring — bottom right */
        #bs-ring-a {
            bottom:-180px; right:8%;
            width:420px; height:420px;
            border:2px solid rgba(6,182,212,0.26);
            box-shadow:0 0 50px rgba(6,182,212,0.07);
            border-radius:50%;
            animation:bs-rspin 110s linear infinite;
        }
        /* Inner ring */
        #bs-ring-b {
            bottom:-100px; right:13%;
            width:250px; height:250px;
            border:1px solid rgba(6,182,212,0.20);
            border-radius:50%;
            animation:bs-spin 70s linear infinite;
        }
        /* Small hex — top-left, amber */
        #bs-hex-c {
            top:60px; left:40px;
            width:90px; height:90px;
            border:1px solid rgba(245,158,11,0.45);
            box-shadow:0 0 18px rgba(245,158,11,0.12);
            clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
            animation:bs-float 7s ease-in-out infinite;
        }
        /* Small triangle — center right, rose */
        #bs-tri-b {
            top:28%; right:6%;
            width:72px; height:72px;
            border:1px solid rgba(244,63,94,0.40);
            box-shadow:0 0 14px rgba(244,63,94,0.1);
            clip-path:polygon(50% 0%,0% 100%,100% 100%);
            animation:bs-float 10s ease-in-out infinite 2s;
        }
        /* Radial glow blob — center */
        #bs-blob {
            top:50%; left:50%;
            width:600px; height:600px;
            transform:translate(-50%,-50%);
            background:radial-gradient(ellipse at center, rgba(99,102,241,0.04) 0%, transparent 65%);
            animation:bs-pulse 5s ease-in-out infinite;
        }
        /* Dot grid */
        #bs-grid {
            inset:0;
            background-image:radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size:28px 28px;
        }

        /* ── Content wrapper — sits above shapes ── */
        #bs-content {
            position:relative; z-index:2;
            display:flex; flex-direction:column;
            align-items:center; gap:0;
        }

        #bs-logo-ring {
            position:relative; width:72px; height:72px;
        }
        #bs-logo-ring svg { display:block; }
        /* Spinning ring around logo */
        #bs-logo-ring::after {
            content:'';
            position:absolute; inset:-10px;
            border-radius:50%;
            border:1px solid transparent;
            border-top-color:rgba(99,102,241,0.6);
            border-right-color:rgba(6,182,212,0.4);
            animation:bs-spin 2.4s linear infinite;
        }

        #bs-title {
            margin-top:22px;
            font-size:17px; font-weight:bold; letter-spacing:0.22em;
            background:linear-gradient(135deg,#ffffff 0%,#a5b4fc 50%,#67e8f9 100%);
            background-size:200% auto;
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text;
            animation:bs-grad 4s ease-in-out infinite, bs-glow 3s ease-in-out infinite;
        }
        #bs-subtitle {
            margin-top:6px;
            font-size:10px; letter-spacing:0.14em; color:#7070a0;
        }

        /* ── Progress block ── */
        #bs-progress {
            margin-top:40px; width:400px;
            display:flex; flex-direction:column; gap:12px;
        }
        #bs-bar-label {
            display:flex; justify-content:space-between; align-items:baseline;
        }
        #bs-bar-label span:first-child {
            font-size:10px; letter-spacing:0.13em; color:#ccccdd; font-weight:bold;
        }
        #ec-pct {
            font-size:13px; font-weight:bold; letter-spacing:0.06em; color:#ffffff;
        }

        #bs-track {
            position:relative; height:10px;
            background:rgba(20,20,35,0.9);
            border:1px solid rgba(99,102,241,0.25);
            overflow:hidden;
        }
        #ec-bar {
            position:absolute; left:0; top:0; bottom:0; width:0%;
            background:linear-gradient(90deg, #6366f1, #06b6d4);
            background-size:200% 100%;
            animation:bs-grad 3s ease-in-out infinite;
            box-shadow:0 0 14px rgba(99,102,241,0.6), 0 0 30px rgba(6,182,212,0.3);
            transition:width 280ms linear;
        }
        /* Scan line on bar */
        #bs-track::after {
            content:'';
            position:absolute; left:0; right:0; top:-3px; height:3px;
            background:linear-gradient(90deg,transparent,rgba(99,102,241,0.9),rgba(6,182,212,0.7),transparent);
            animation:bs-scan 3s linear infinite;
            z-index:3;
        }
        /* Segment ticks */
        #bs-ticks {
            position:absolute; inset:0;
            display:flex; justify-content:space-between; pointer-events:none; z-index:2;
        }
        #bs-ticks div { width:2px; background:rgba(6,6,9,0.7); }

        #ec-stage {
            font-size:11px; letter-spacing:0.11em; color:#8888bb; min-height:16px;
        }
        #ec-stage::before { content:'▸ '; color:#6366f1; }
    </style>

    <div id="app">
        <div id="ec-boot">
            <!-- Geometric background shapes -->
            <div id="bs-grid"  class="bs-geo"></div>
            <div id="bs-blob"  class="bs-geo"></div>
            <div id="bs-hex-a" class="bs-geo"></div>
            <div id="bs-hex-b" class="bs-geo"></div>
            <div id="bs-tri-a" class="bs-geo"></div>
            <div id="bs-dia"   class="bs-geo"></div>
            <div id="bs-ring-a"class="bs-geo"></div>
            <div id="bs-ring-b"class="bs-geo"></div>
            <div id="bs-hex-c" class="bs-geo"></div>
            <div id="bs-tri-b" class="bs-geo"></div>

            <!-- Content -->
            <div id="bs-content">
                <div id="bs-logo-ring">
                    <svg width="72" height="72" viewBox="0 0 64 64" fill="none">
                        <polygon points="32,6 58,18 58,46 32,58 6,46 6,18"
                                 fill="none" stroke="#6366f1" stroke-width="1.5"/>
                        <polygon points="32,14 50,22 50,42 32,50 14,42 14,22"
                                 fill="none" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
                        <circle cx="32" cy="32" r="4" fill="rgba(99,102,241,0.6)"/>
                    </svg>
                </div>

                <div id="bs-title">DOTREPORT / EDGECORE</div>
                <div id="bs-subtitle">NET-FORGE DOCUMENT ANALYSIS SYSTEM — REV-2026-A</div>

                <div id="bs-progress">
                    <div id="bs-bar-label">
                        <span>EXECUTION ENGINE LOAD IN PROGRESS</span>
                        <span id="ec-pct">0%</span>
                    </div>
                    <div id="bs-track">
                        <div id="ec-bar"></div>
                        <div id="bs-ticks">
                            <div></div><div></div><div></div><div></div>
                            <div></div><div></div><div></div><div></div>
                        </div>
                    </div>
                    <div id="ec-stage">LOADING WASM RUNTIME</div>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none">
        <span class="dismiss" onclick="document.getElementById('blazor-error-ui').style.display='none'">✕</span>
        <p>RUNTIME ERROR — SEE CONSOLE</p>
    </div>

    <!-- Core app interop (file download, drag-drop, theme switching) -->
    <script src="js/app-interop.js"></script>

    <!-- Blazor WASM bootstrap — auto-start (default) -->
    <script src="_framework/blazor.webassembly.js"></script>

    <!-- Boot screen animation + auto-dismiss watcher -->
    <script>
        (function () {
            const bar   = document.getElementById('ec-bar');
            const pct   = document.getElementById('ec-pct');
            const stage = document.getElementById('ec-stage');

            const stages = [
                { at:  0, label: 'LOADING WASM RUNTIME' },
                { at: 12, label: 'BOOTSTRAPPING .NET CLR' },
                { at: 25, label: 'RESOLVING ASSEMBLIES' },
                { at: 38, label: 'INITIALISING INTEROP LAYER' },
                { at: 52, label: 'BINDING ONNX EXECUTION PROVIDER' },
                { at: 65, label: 'REGISTERING INFERENCE SERVICES' },
                { at: 78, label: 'MOUNTING RENDER PIPELINE' },
                { at: 90, label: 'FINALISING ENGINE STATE' },
            ];

            let current = 0, stageIdx = 0;

            function setProgress(value) {
                current = Math.min(value, 99);
                if (bar) bar.style.width = current + '%';
                if (pct) pct.textContent = Math.floor(current) + '%';
                for (let i = stages.length - 1; i >= 0; i--) {
                    if (current >= stages[i].at) {
                        if (stageIdx !== i) { stageIdx = i; if (stage) stage.textContent = stages[i].label; }
                        break;
                    }
                }
            }

            // Simulate realistic WASM boot curve
            const schedule = [
                { target:  8, duration: 180 },
                { target: 25, duration: 600 },
                { target: 40, duration: 900 },
                { target: 55, duration: 700 },
                { target: 70, duration: 500 },
                { target: 82, duration: 600 },
                { target: 90, duration: 800 },
            ];

            let step = 0, startTime = null, startVal = 0;
            function animate(ts) {
                if (step >= schedule.length) return;
                if (!startTime) { startTime = ts; startVal = current; }
                const { target, duration } = schedule[step];
                const t = Math.min((ts - startTime) / duration, 1);
                setProgress(startVal + (target - startVal) * (1 - (1 - t) * (1 - t)));
                if (t < 1) { requestAnimationFrame(animate); }
                else { step++; startTime = null; startVal = current; if (step < schedule.length) requestAnimationFrame(animate); }
            }
            requestAnimationFrame(animate);

            // Blazor auto-starts and replaces #app children, naturally removing #ec-boot from DOM.
            // MutationObserver detects the replacement and clears the stuck-timeout.
            const app = document.getElementById('app');
            const stuckTimer = setTimeout(() => {
                // Still showing after 30s — show error, then force dismiss
                if (stage) { stage.style.color = '#f43f5e'; stage.textContent = 'LOAD TIMEOUT — CHECK BROWSER CONSOLE'; }
                if (pct)   { pct.style.color = '#f43f5e'; }
                setTimeout(() => {
                    const b = document.getElementById('ec-boot');
                    if (b) { b.style.transition = 'opacity 400ms'; b.style.opacity = '0'; setTimeout(() => b.style.display = 'none', 420); }
                }, 5000);
            }, 30000);

            if (app) {
                const obs = new MutationObserver(() => {
                    if (!document.getElementById('ec-boot')) { clearTimeout(stuckTimer); obs.disconnect(); }
                });
                obs.observe(app, { childList: true });
            }
        })();
    </script>
</body>
</html>
