name: DotReport EdgeCore CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Unit & Component Tests (xUnit + bUnit) ────────────────────────────────
  unit-tests:
    name: Unit & Component Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore src/DotReport.sln

      - name: Build
        run: dotnet build src/DotReport.sln --configuration Release --no-restore

      - name: Run xUnit Proxy Tests
        run: |
          dotnet test tests/DotReport.Proxy.Tests/DotReport.Proxy.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=proxy-results.trx" \
            --results-directory ./test-results

      - name: Run bUnit Component Tests
        run: |
          dotnet test tests/DotReport.Components.Tests/DotReport.Components.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=component-results.trx" \
            --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ./test-results/*.trx

  # ── Python Factory Tests (pytest) ────────────────────────────────────────
  factory-tests:
    name: Python Factory Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install test dependencies (no GPU packages)
        run: |
          pip install pytest pytest-cov flake8
          pip install onnx onnxruntime rich numpy

      - name: Lint factory scripts
        run: flake8 factory/ --max-line-length=100 --ignore=E501,W503,E402

      - name: Run pytest (factory tests)
        run: |
          pytest tests/factory/ \
            --tb=short \
            --cov=factory \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: factory-coverage
          path: coverage.xml

  # ── E2E Tests (Playwright) — runs after app is built ─────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore & Build
        run: |
          dotnet restore src/DotReport.sln
          dotnet build src/DotReport.sln --configuration Release --no-restore

      - name: Publish Blazor WASM
        run: |
          dotnet publish src/DotReport.Client/DotReport.Client.csproj \
            --configuration Release --output ./publish

      - name: Start dev server
        run: |
          cd publish/wwwroot
          python3 -m http.server 5000 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 3

      - name: Install Playwright browsers
        run: |
          dotnet build tests/DotReport.E2E.Tests/DotReport.E2E.Tests.csproj --configuration Release
          pwsh tests/DotReport.E2E.Tests/bin/Release/net9.0/playwright.ps1 install chromium

      - name: Run Playwright E2E tests
        env:
          DOTREPORT_BASE_URL: http://localhost:5000
        run: |
          dotnet test tests/DotReport.E2E.Tests/DotReport.E2E.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=e2e-results.trx" \
            --results-directory ./test-results

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: ./test-results/*.trx

  # ── Build & Publish ────────────────────────────────────────────────────────
  build-blazor:
    name: Build & Publish Blazor WASM
    needs: [ unit-tests, factory-tests ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore src/DotReport.sln

      - name: Build
        run: dotnet build src/DotReport.sln --configuration Release --no-restore

      - name: Publish
        run: |
          dotnet publish src/DotReport.Client/DotReport.Client.csproj \
            --configuration Release \
            --output ./publish \
            --no-build

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm-publish
          path: ./publish/wwwroot
          retention-days: 7

  # ── Deploy to GitHub Pages ─────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-blazor
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: blazor-wasm-publish
          path: ./wwwroot

      - name: Fix Blazor base path for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/DotReport/" />|g' ./wwwroot/index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./wwwroot

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
